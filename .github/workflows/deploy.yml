name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-voice-ai-workshop
  APP_NAME: voice-ai-workshop
  LOCATION: centralus
  ACR_NAME: voiceaiworkshop
  ENV_NAME: voiceaiworkshop
  STORAGE_ACCOUNT: voiceaiworkshop
  FILE_SHARE: voiceaidata
  IMAGE_TAG: voice-ai-workshop:${{ github.sha }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-deploy:
    needs: ci
    if: needs.ci.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # --- Infrastructure (idempotent — safe to run every time) ---

      - name: Ensure Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags created_by=anthonyjdella

      - name: Ensure Container Registry
        run: |
          if ! az acr show --name ${{ env.ACR_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            echo "Creating ACR..."
            az acr create \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.ACR_NAME }} \
              --sku Basic \
              --admin-enabled true \
              --tags created_by=anthonyjdella
          else
            echo "ACR already exists"
          fi
          # Verify ACR is accessible
          az acr show --name ${{ env.ACR_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "loginServer" -o tsv

      - name: Ensure Log Analytics Workspace
        run: |
          if ! az monitor log-analytics workspace show --workspace-name law-${{ env.ENV_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            echo "Creating Log Analytics workspace..."
            az monitor log-analytics workspace create \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --workspace-name law-${{ env.ENV_NAME }} \
              --location ${{ env.LOCATION }} \
              --tags created_by=anthonyjdella
          else
            echo "Log Analytics workspace already exists"
          fi

      - name: Ensure Container Apps Environment
        run: |
          if ! az containerapp env show --name ${{ env.ENV_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            LOG_ID=$(az monitor log-analytics workspace show \
              --workspace-name law-${{ env.ENV_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query customerId -o tsv)
            LOG_KEY=$(az monitor log-analytics workspace get-shared-keys \
              --workspace-name law-${{ env.ENV_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query primarySharedKey -o tsv)
            echo "Creating Container Apps Environment..."
            az containerapp env create \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.ENV_NAME }} \
              --location ${{ env.LOCATION }} \
              --logs-workspace-id "$LOG_ID" \
              --logs-workspace-key "$LOG_KEY" \
              --tags created_by=anthonyjdella
          else
            echo "Container Apps Environment already exists"
          fi

      - name: Ensure Storage Account
        run: |
          az storage account show --name ${{ env.STORAGE_ACCOUNT }} --resource-group ${{ env.RESOURCE_GROUP }} 2>/dev/null || \
          az storage account create \
            --name ${{ env.STORAGE_ACCOUNT }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --sku Standard_LRS \
            --tags created_by=anthonyjdella \
            --output none

      - name: Ensure File Share
        run: |
          STORAGE_KEY=$(az storage account keys list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --query '[0].value' -o tsv)
          az storage share create \
            --name ${{ env.FILE_SHARE }} \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --account-key "$STORAGE_KEY" \
            --quota 10 \
            --output none 2>/dev/null || true

      - name: Configure Azure Files storage mount
        run: |
          STORAGE_KEY=$(az storage account keys list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --query '[0].value' -o tsv)
          az containerapp env storage set \
            --name ${{ env.ENV_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --storage-name appdata \
            --azure-file-account-name ${{ env.STORAGE_ACCOUNT }} \
            --azure-file-account-key "$STORAGE_KEY" \
            --azure-file-share-name ${{ env.FILE_SHARE }} \
            --access-mode ReadWrite \
            --output none

      # --- Build ---

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_TAG }} \
            --image twilio-voice-ai:latest \
            .

      # --- Deploy ---

      - name: Get ACR credentials
        id: acr
        run: |
          echo "server=${{ env.ACR_NAME }}.azurecr.io" >> $GITHUB_OUTPUT
          echo "username=$(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv)" >> $GITHUB_OUTPUT
          echo "password=$(az acr credential show --name ${{ env.ACR_NAME }} --query passwords[0].value -o tsv)" >> $GITHUB_OUTPUT

      - name: Set secrets
        run: |
          az containerapp secret set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secrets \
              "twilio-account-sid=${{ secrets.TWILIO_ACCOUNT_SID }}" \
              "twilio-auth-token=${{ secrets.TWILIO_AUTH_TOKEN }}" \
              "twilio-phone-number=${{ secrets.TWILIO_PHONE_NUMBER }}" \
              "openai-api-key=${{ secrets.OPENAI_API_KEY }}" \
            --output none 2>/dev/null || true

      - name: Deploy Container App
        run: |
          export APP_NAME="${{ env.APP_NAME }}"
          export CONTAINER_IMAGE="${{ steps.acr.outputs.server }}/${{ env.IMAGE_TAG }}"
          envsubst < .github/containerapp.yaml > /tmp/containerapp.yaml

          if az containerapp show --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} 2>/dev/null; then
            echo "Updating existing container app..."
            az containerapp update \
              --name ${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --yaml /tmp/containerapp.yaml \
              --output none
          else
            echo "Creating new Container App..."
            az containerapp create \
              --name ${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment ${{ env.ENV_NAME }} \
              --tags created_by=anthonyjdella \
              --registry-server ${{ steps.acr.outputs.server }} \
              --registry-username ${{ steps.acr.outputs.username }} \
              --registry-password ${{ steps.acr.outputs.password }} \
              --yaml /tmp/containerapp.yaml \
              --output none

            az containerapp secret set \
              --name ${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --secrets \
                "twilio-account-sid=${{ secrets.TWILIO_ACCOUNT_SID }}" \
                "twilio-auth-token=${{ secrets.TWILIO_AUTH_TOKEN }}" \
                "twilio-phone-number=${{ secrets.TWILIO_PHONE_NUMBER }}" \
                "openai-api-key=${{ secrets.OPENAI_API_KEY }}" \
                --output none
          fi

      - name: Print app URL
        run: |
          FQDN=$(az containerapp show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo ""
          echo "=========================================="
          echo "  Deployment complete!"
          echo "=========================================="
          echo "  App URL:     https://${FQDN}"
          echo "  WebSocket:   wss://${FQDN}/ws"
          echo "  Call API:    https://${FQDN}/api/call"
          echo "  TwiML:       https://${FQDN}/api/twiml"
          echo "=========================================="
