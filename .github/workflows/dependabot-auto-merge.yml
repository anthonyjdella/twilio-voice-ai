name: Auto-merge Dependabot

# pull_request_target is required because Dependabot PRs have read-only
# tokens under the regular pull_request trigger. pull_request_target runs
# in the context of the base branch and has write permissions.
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve minor/patch updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Without GitHub Pro, branch protection/rulesets aren't available on
      # private repos, so --auto would merge immediately without waiting for
      # CI. Instead, we poll for the Validate check to pass before merging.
      - name: Wait for CI to pass
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: |
          echo "Waiting for CI check to complete..."
          TIMEOUT=600
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATE=$(gh pr checks "$PR_URL" --json name,state \
              --jq '.[] | select(.name == "Typecheck, Lint & Build") | .state' 2>/dev/null || true)
            if [ "$STATE" = "SUCCESS" ]; then
              echo "CI passed"
              exit 0
            elif [ "$STATE" = "FAILURE" ] || [ "$STATE" = "ERROR" ]; then
              echo "CI failed ($STATE) — skipping merge"
              exit 1
            fi
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          echo "Timed out waiting for CI after ${TIMEOUT}s"
          exit 1
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge minor/patch updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
